<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scratch Card · Expire & Copy</title>
    <style>
        /* ===== CSS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #070b15;
            --bg-surface: #0f172a;
            --bg-card: #1a2338;
            --bg-card-hover: #212d48;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(157, 0, 255, 0.4);
            --primary-neon: #00f0ff;
            --secondary-neon: #ff007f;
            --accent-purple: #9d00ff;
            --accent-gradient: linear-gradient(135deg, var(--secondary-neon), var(--primary-neon));
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 40px rgba(0, 240, 255, 0.15);
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: transparent;
            color: var(--text-primary);
            min-height: auto;
            padding: 0;
            margin: 0;
        }

        .scratch-section {
            padding: 24px 20px 28px;
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .scratch-section::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            height: 2px;
            background: var(--accent-gradient);
            opacity: 0.6;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .scratch-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .scratch-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scratch-header h3 i {
            -webkit-text-fill-color: initial;
            color: var(--primary-neon);
            font-size: 1.2rem;
        }

        .scratch-badge {
            background: rgba(255, 0, 127, 0.12);
            border: 1px solid rgba(255, 0, 127, 0.2);
            padding: 3px 14px;
            border-radius: 40px;
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--secondary-neon);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .scratch-card-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .scratch-card {
            position: relative;
            width: 340px;
            height: 140px;
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.06), inset 0 0 30px rgba(0, 240, 255, 0.02);
            border: 2px solid var(--border-subtle);
            transition: var(--transition);
            flex-shrink: 0;
            background: var(--bg-card);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .scratch-card:hover {
            border-color: var(--primary-neon);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.12), inset 0 0 40px rgba(0, 240, 255, 0.03);
            transform: scale(1.01);
        }

        .promo-result {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            padding: 16px;
            z-index: 1;
            text-align: center;
        }

        .promo-result .promo-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 2px;
            font-weight: 500;
        }

        .promo-result .promo-code {
            font-size: 1.9rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            line-height: 1.2;
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.15);
        }
        .promo-result .promo-code.expired-status {
            background: none;
            -webkit-text-fill-color: #f87171;
            color: #f87171;
            background-clip: unset;
        }
        .promo-result .promo-code.full-status {
            background: none;
            -webkit-text-fill-color: #fbbf24;
            color: #fbbf24;
            background-clip: unset;
        }
        .promo-result .promo-code.revealed-expired {
            background: none;
            -webkit-text-fill-color: #fbbf24;
            color: #fbbf24;
            background-clip: unset;
        }

        .promo-result .promo-value {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
            font-weight: 500;
        }

        .promo-result .promo-value i {
            color: var(--secondary-neon);
            margin-right: 4px;
        }

        .promo-result .promo-expiry {
            font-size: 0.55rem;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        .promo-result .promo-expiry i {
            color: var(--primary-neon);
            margin-right: 4px;
        }

        .promo-uses {
            font-size: 0.55rem;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        .promo-uses i {
            color: var(--secondary-neon);
            margin-right: 4px;
        }

        .copy-wrapper {
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .copy-btn {
            background: rgba(0, 240, 255, 0.08);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 30px;
            padding: 3px 14px 3px 10px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--primary-neon);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
            font-family: inherit;
        }
        .copy-btn i {
            font-size: 0.7rem;
        }
        .copy-btn:hover {
            background: rgba(0, 240, 255, 0.18);
            border-color: var(--primary-neon);
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
        }
        .copy-btn.copied {
            border-color: #4caf50;
            color: #4caf50;
            background: rgba(76, 175, 80, 0.12);
        }
        .copy-btn.copied i {
            color: #4caf50;
        }
        .copy-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        #scratchCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            border-radius: var(--radius-md);
            touch-action: none;
            cursor: pointer;
            display: block;
        }

        .scratch-progress {
            position: absolute;
            bottom: 8px;
            right: 10px;
            z-index: 4;
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 500;
            letter-spacing: 0.5px;
            pointer-events: none;
            transition: opacity 0.6s ease;
            font-variant-numeric: tabular-nums;
        }

        .scratch-progress.hidden {
            opacity: 0;
        }

        .scratch-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            max-width: 260px;
            text-align: center;
            line-height: 1.6;
        }

        .scratch-desc i {
            color: var(--primary-neon);
            margin: 0 2px;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: var(--radius-md);
        }

        .loading-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-subtle);
            border-top: 3px solid var(--primary-neon);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 10px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 700px) {
            .scratch-section {
                padding: 18px 14px 22px;
            }
            .scratch-header h3 {
                font-size: 0.95rem;
            }
            .scratch-card {
                width: 280px;
                height: 120px;
            }
            .promo-result .promo-code {
                font-size: 1.5rem;
            }
            .scratch-badge {
                font-size: 0.45rem;
                padding: 2px 10px;
            }
            .scratch-desc {
                font-size: 0.65rem;
                max-width: 200px;
            }
            .scratch-progress {
                font-size: 0.45rem;
                bottom: 4px;
                right: 6px;
            }
        }

        @media (max-width: 420px) {
            .scratch-card {
                width: 230px;
                height: 105px;
            }
            .promo-result .promo-code {
                font-size: 1.2rem;
            }
            .promo-result .promo-label {
                font-size: 0.45rem;
            }
            .promo-result .promo-value {
                font-size: 0.6rem;
            }
            .scratch-desc {
                font-size: 0.6rem;
                max-width: 170px;
            }
        }
    </style>
</head>
<body>

    <div class="scratch-section">
        <div class="scratch-header">
            <h3>
                <i class="fas fa-ticket-alt"></i>
                Lucky Scratch Card
            </h3>
            <span class="scratch-badge"><i class="fas fa-bolt"></i> Scratch & Win</span>
        </div>

        <div class="scratch-card-wrapper">
            <div class="scratch-card" id="scratchCard">

                <!-- Loading Overlay -->
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <p>Loading promo...</p>
                </div>

                <!-- Result area -->
                <div class="promo-result" id="promoResult">
                    <span class="promo-label"><i class="fas fa-gift"></i> Your Promo Code</span>
                    <span class="promo-code" id="promoCodeDisplay">———</span>
                    <span class="promo-value" id="promoValueDisplay"><i class="fas fa-percent"></i> Loading...</span>
                    <span class="promo-uses" id="promoUsesDisplay">
                        <i class="fas fa-users"></i> Uses: <span id="usesCount">—</span>/<span id="maxUsesCount">—</span>
                    </span>
                    <span class="promo-expiry" id="promoExpiryDisplay"><i class="far fa-calendar-alt"></i> Expires: —</span>
                    <div class="copy-wrapper" id="copyWrapper">
                        <button class="copy-btn" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
                    </div>
                </div>

                <!-- Scratch canvas -->
                <canvas id="scratchCanvas"></canvas>
                <span class="scratch-progress" id="scratchProgress">0%</span>
            </div>

            <div class="scratch-desc" id="statusMessage">
                <i class="fas fa-hand-pointer" style="color:var(--secondary-neon);"></i>
                Swipe with your finger to scratch and reveal your promo code.
                <br />
                <span style="font-size:0.65rem; color:var(--text-muted);">Single-use promo code.</span>
            </div>
        </div>
    </div>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js">
    </script>

    <script>
        // ================================================================
        // 🔥 FIREBASE CONFIG
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAGsw8OKSeuhkhzPct_0ewvCBM7JcTftj4",
            authDomain: "scratch-card-promo-6883d.firebaseapp.com",
            databaseURL: "https://scratch-card-promo-6883d-default-rtdb.firebaseio.com",
            projectId: "scratch-card-promo-6883d",
            storageBucket: "scratch-card-promo-6883d.firebasestorage.app",
            messagingSenderId: "334910262552",
            appId: "1:334910262552:web:45e2f372d64f6f5166626d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ================================================================
        // 💾 DEVICE ID (Unique per browser)
        // ================================================================
        function getDeviceId() {
            let deviceId = localStorage.getItem('deviceId');
            if (!deviceId) {
                deviceId = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('deviceId', deviceId);
            }
            return deviceId;
        }
        const DEVICE_ID = getDeviceId();

        // ================================================================
        // 💾 REVEAL STATUS FUNCTIONS (Firebase based)
        // ================================================================

        async function getRevealedStatus(code) {
            try {
                const ref = db.ref('revealedStatus/' + code + '/' + DEVICE_ID);
                const snapshot = await ref.once('value');
                return snapshot.val() === true;
            } catch (error) {
                console.error('❌ Error checking reveal status:', error);
                return false;
            }
        }

        async function setRevealedStatus(code, status) {
            try {
                const ref = db.ref('revealedStatus/' + code + '/' + DEVICE_ID);
                await ref.set(status);
                return true;
            } catch (error) {
                console.error('❌ Error setting reveal status:', error);
                return false;
            }
        }

        // ================================================================
        // DOM refs
        // ================================================================
        const loadingOverlay = document.getElementById('loadingOverlay');
        const promoCodeDisplay = document.getElementById('promoCodeDisplay');
        const promoValueDisplay = document.getElementById('promoValueDisplay');
        const promoExpiryDisplay = document.getElementById('promoExpiryDisplay');
        const usesCount = document.getElementById('usesCount');
        const maxUsesCount = document.getElementById('maxUsesCount');
        const copyBtn = document.getElementById('copyBtn');
        const statusMessage = document.getElementById('statusMessage');
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        const progressEl = document.getElementById('scratchProgress');
        const cardEl = document.getElementById('scratchCard');

        // ================================================================
        // State
        // ================================================================
        let selectedCode = null;
        let promo = null;
        let promoCodes = {};
        let isDrawing = false;
        let isRevealed = false;
        let isUpdating = false;
        let isDateExpired = false;
        let isUsageExhausted = false;
        let justClaimed = false;
        const RADIUS = 28;
        const REVEAL_THRESHOLD = 0.50;

        // ================================================================
        // 📡 REALTIME DATABASE FUNCTIONS
        // ================================================================

        async function fetchPromoCodesFromFirebase() {
            try {
                const snapshot = await db.ref('promoCodes').once('value');
                const data = snapshot.val();
                if (data && typeof data === 'object') {
                    for (const code in data) {
                        const item = data[code];
                        if (!item.label) item.label = code;
                        if (!item.type) item.type = 'percent';
                        if (!item.value) item.value = 0;
                        if (!item.expiry) item.expiry = '';
                        if (!item.max_uses) item.max_uses = 100;
                        if (item.used === undefined) item.used = 0;
                    }
                    return data;
                } else {
                    return {};
                }
            } catch (error) {
                console.error('❌ Error fetching promo codes:', error);
                return {};
            }
        }

        async function getPromoUsageFromRTDB(code) {
            try {
                const ref = db.ref('promoCodes/' + code);
                const snapshot = await ref.once('value');
                if (snapshot.exists()) {
                    return snapshot.val();
                } else {
                    const newData = {
                        used: 0,
                        max_uses: promoCodes[code]?.max_uses || 100,
                        createdAt: Date.now()
                    };
                    await ref.set(newData);
                    return newData;
                }
            } catch (error) {
                console.error('❌ Error getting promo usage:', error);
                return getPromoUsageFromLocal(code);
            }
        }

        async function updatePromoUsageInRTDB(code) {
            try {
                const ref = db.ref('promoCodes/' + code);
                const snapshot = await ref.once('value');
                let currentData = snapshot.val();

                if (!currentData) {
                    currentData = {
                        used: 0,
                        max_uses: promoCodes[code]?.max_uses || 100,
                        createdAt: Date.now()
                    };
                }

                const newUsed = (currentData.used || 0) + 1;
                currentData.used = newUsed;
                currentData.updatedAt = Date.now();

                await ref.set(currentData);

                return {
                    used: newUsed,
                    max_uses: currentData.max_uses
                };
            } catch (error) {
                console.error('❌ Error updating promo usage:', error);
                return updatePromoUsageInLocal(code);
            }
        }

        function getPromoUsageFromLocal(code) {
            const allData = localStorage.getItem('promo_usage_data');
            let usageData = allData ? JSON.parse(allData) : {};
            if (!usageData[code]) {
                usageData[code] = {
                    used: 0,
                    max_uses: promoCodes[code]?.max_uses || 100
                };
                localStorage.setItem('promo_usage_data', JSON.stringify(usageData));
            }
            return usageData[code];
        }

        function updatePromoUsageInLocal(code) {
            const allData = localStorage.getItem('promo_usage_data');
            let usageData = allData ? JSON.parse(allData) : {};
            if (!usageData[code]) {
                usageData[code] = {
                    used: 0,
                    max_uses: promoCodes[code]?.max_uses || 100
                };
            }
            usageData[code].used += 1;
            localStorage.setItem('promo_usage_data', JSON.stringify(usageData));
            return usageData[code];
        }

        // ================================================================
        // 🧭 Helper: is code expired?
        // ================================================================
        function isCodeExpired(code) {
            const p = promoCodes[code];
            if (!p || !p.expiry) return false;
            const expiryDate = new Date(p.expiry);
            const today = new Date();
            return expiryDate <= today;
        }

        // ================================================================
        // 🎯 MAIN LOGIC
        // ================================================================

        async function loadPromoCode() {
            loadingOverlay.style.display = 'flex';
            justClaimed = false;

            promoCodes = await fetchPromoCodesFromFirebase();
            const codeKeys = Object.keys(promoCodes);

            if (codeKeys.length === 0) {
                selectedCode = null;
                promo = null;
                isRevealed = false;
                canvas.style.display = 'none';
                progressEl.classList.add('hidden');
                promoCodeDisplay.textContent = '🚫 NO CODES';
                promoValueDisplay.innerHTML = '<i class="fas fa-times-circle"></i> No promo codes found.';
                statusMessage.innerHTML = 'Please contact admin to add codes.';
                copyBtn.style.display = 'none';
                loadingOverlay.style.display = 'none';
                return;
            }

            let storedCode = localStorage.getItem('myPromoCode');
            let usage = null;
            let foundValid = false;
            let rejectReason = '';

            if (storedCode) {
                const p = promoCodes[storedCode];
                if (!p) {
                    rejectReason = 'removed';
                } else {
                    if (p.expiry && new Date(p.expiry) <= new Date()) {
                        rejectReason = 'expired';
                    } else {
                        let u;
                        try {
                            u = await getPromoUsageFromRTDB(storedCode);
                        } catch (e) {
                            u = getPromoUsageFromLocal(storedCode);
                        }
                        if (u) {
                            const used = u.used || 0;
                            const max = u.max_uses || p.max_uses || 100;
                            if (used >= max) {
                                rejectReason = 'full';
                            } else {
                                usage = u;
                                foundValid = true;
                                selectedCode = storedCode;
                            }
                        } else {
                            rejectReason = 'removed';
                        }
                    }
                }
            }

            if (!foundValid) {
                const shuffled = codeKeys.sort(() => Math.random() - 0.5);
                for (const c of shuffled) {
                    if (c === storedCode) continue;
                    const p = promoCodes[c];
                    if (!p) continue;
                    if (p.expiry && new Date(p.expiry) <= new Date()) continue;
                    let u;
                    try {
                        u = await getPromoUsageFromRTDB(c);
                    } catch (e) {
                        u = getPromoUsageFromLocal(c);
                    }
                    if (u) {
                        const used = u.used || 0;
                        const max = u.max_uses || p.max_uses || 100;
                        if (used < max) {
                            selectedCode = c;
                            usage = u;
                            foundValid = true;
                            localStorage.setItem('myPromoCode', selectedCode);
                            break;
                        }
                    }
                }
            }

            if (!foundValid || !usage) {
                selectedCode = null;
                promo = null;
                isRevealed = false;
                canvas.style.display = 'none';
                progressEl.classList.add('hidden');
                promoCodeDisplay.textContent = '🚫 NO CODES';
                promoValueDisplay.innerHTML = '<i class="fas fa-times-circle"></i> All promo codes are fully used or expired.';
                statusMessage.innerHTML = 'Please contact admin to add more codes.';
                copyBtn.style.display = 'none';
                loadingOverlay.style.display = 'none';
                return;
            }

            promo = promoCodes[selectedCode];

            if (rejectReason === 'expired') {
                statusMessage.innerHTML =
                    '⏰ Your previous promo code expired. A new code has been assigned to you!';
            } else if (rejectReason === 'full') {
                statusMessage.innerHTML =
                    '🚫 Your previous promo code was fully used. A new code has been assigned to you!';
            } else if (rejectReason === 'removed') {
                statusMessage.innerHTML =
                    '🔄 Your previous promo code is no longer available. Here is a new one!';
            } else {
                statusMessage.innerHTML =
                    '<i class="fas fa-hand-pointer" style="color:var(--secondary-neon);"></i> Swipe with your finger to scratch and reveal your promo code.';
            }

            // 🔥 Check reveal status from Firebase
            isRevealed = await getRevealedStatus(selectedCode);
            if (isRevealed) {
                canvas.style.display = 'none';
                progressEl.classList.add('hidden');
            } else {
                canvas.style.display = 'block';
                progressEl.classList.remove('hidden');
            }

            displayPromoInfo(usage, false);
            loadingOverlay.style.display = 'none';
        }

        // ================================================================
        // 🖼️ DISPLAY PROMO INFO
        // ================================================================

        function displayPromoInfo(usage, claimedByUser = false) {
            const used = usage.used || 0;
            const maxU = usage.max_uses || promo.max_uses || 100;

            promoExpiryDisplay.innerHTML = promo.expiry ?
                `<i class="far fa-calendar-alt"></i> Expires: ${promo.expiry}` :
                `<i class="far fa-calendar-alt"></i> No expiry`;

            usesCount.textContent = used;
            maxUsesCount.textContent = maxU;

            const expiryDate = promo.expiry ? new Date(promo.expiry) : null;
            const today = new Date();
            isDateExpired = expiryDate ? expiryDate <= today : false;
            isUsageExhausted = used >= maxU;

            promoCodeDisplay.classList.remove('expired-status', 'full-status', 'revealed-expired');

            let codeDisplay = '';
            let valueDisplay = '';
            let statusHtml = '';
            let showCopy = false;
            let copyDisabled = false;

            if (claimedByUser) {
                codeDisplay = selectedCode;
                valueDisplay = `<i class="fas fa-gift"></i> ${promo.label}`;
                statusHtml = `<i class="fas fa-check-circle" style="color:#4caf50;"></i> Promo code revealed! Copy and use it.`;
                showCopy = true;
                copyDisabled = false;
                if (isDateExpired) {
                    promoCodeDisplay.classList.add('revealed-expired');
                    statusHtml =
                        `<i class="fas fa-exclamation-triangle" style="color:#fbbf24;"></i> This promo has expired, but you already revealed it.`;
                }
            } else if (isDateExpired) {
                codeDisplay = '⛔ EXPIRED';
                valueDisplay = '<i class="fas fa-exclamation-triangle"></i> This promo has expired.';
                statusHtml =
                    `<i class="fas fa-times-circle" style="color:#f87171;"></i> This promo code has expired. Please try another card.`;
                promoCodeDisplay.classList.add('expired-status');
                showCopy = false;
                copyDisabled = true;
            } else if (isUsageExhausted) {
                codeDisplay = '⛔ FULLY USED';
                valueDisplay = '<i class="fas fa-users-slash"></i> All slots are taken.';
                statusHtml =
                    `<i class="fas fa-users" style="color:#fbbf24;"></i> This promo code has reached its usage limit. Please try another card.`;
                promoCodeDisplay.classList.add('full-status');
                showCopy = false;
                copyDisabled = true;
            } else {
                if (isRevealed) {
                    codeDisplay = selectedCode;
                    valueDisplay = `<i class="fas fa-gift"></i> ${promo.label}`;
                    statusHtml =
                        `<i class="fas fa-check-circle" style="color:#4caf50;"></i> Promo code revealed! Copy and use it.`;
                    showCopy = true;
                    copyDisabled = false;
                } else {
                    codeDisplay = '???';
                    valueDisplay = `<i class="fas fa-gift"></i> ${promo.label}`;
                    statusHtml =
                        `<i class="fas fa-hand-pointer" style="color:var(--secondary-neon);"></i> Swipe with your finger to scratch and reveal your promo code.`;
                    showCopy = false;
                    copyDisabled = true;
                }
            }

            promoCodeDisplay.textContent = codeDisplay;
            promoValueDisplay.innerHTML = valueDisplay;

            if (claimedByUser || isDateExpired || isUsageExhausted || isRevealed) {
                statusMessage.innerHTML = statusHtml;
            }

            if (showCopy) {
                copyBtn.style.display = 'inline-flex';
                copyBtn.disabled = false;
                copyBtn.classList.remove('copied');
                copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
            } else {
                copyBtn.style.display = 'none';
                copyBtn.disabled = true;
            }
        }

        // ================================================================
        // 🖌️ CANVAS SCRATCH ENGINE
        // ================================================================

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);
            drawCover();
        }

        function drawCover() {
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, w, h);

            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, '#1a2338');
            grad.addColorStop(0.5, '#0f172a');
            grad.addColorStop(1, '#1a2338');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            ctx.strokeStyle = 'rgba(0, 240, 255, 0.04)';
            ctx.lineWidth = 1;
            const step = 20;
            for (let x = 0; x < w; x += step) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
                ctx.stroke();
            }
            for (let y = 0; y < h; y += step) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = '600 1.2rem "Inter", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.fillText('🎟️ Scratch me', w / 2, h / 2 - 8);
            ctx.font = '400 0.6rem "Inter", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.fillText('scratch to reveal', w / 2, h / 2 + 22);

            const cornerLen = 18;
            const cornerColor = 'rgba(0, 240, 255, 0.15)';
            ctx.strokeStyle = cornerColor;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(10, 10 + cornerLen);
            ctx.lineTo(10, 10);
            ctx.lineTo(10 + cornerLen, 10);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(w - 10 - cornerLen, 10);
            ctx.lineTo(w - 10, 10);
            ctx.lineTo(w - 10, 10 + cornerLen);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(10, h - 10 - cornerLen);
            ctx.lineTo(10, h - 10);
            ctx.lineTo(10 + cornerLen, h - 10);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(w - 10 - cornerLen, h - 10);
            ctx.lineTo(w - 10, h - 10);
            ctx.lineTo(w - 10, h - 10 - cornerLen);
            ctx.stroke();
        }

        function scratch(x, y) {
            if (isRevealed || isUpdating) return;
            if (isDateExpired) {
                statusMessage.innerHTML =
                    `<i class="fas fa-times-circle" style="color:#f87171;"></i> This promo has expired. Cannot scratch.`;
                return;
            }
            if (isUsageExhausted && !justClaimed) {
                statusMessage.innerHTML =
                    `<i class="fas fa-users" style="color:#fbbf24;"></i> This promo is fully used. Cannot scratch.`;
                return;
            }

            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            ctx.save();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            updateProgress();
        }

        function updateProgress() {
            if (isRevealed || isUpdating) return;
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            let transparent = 0;
            const total = data.length / 4;
            const step = 4;
            for (let i = 3; i < data.length; i += 4 * step) {
                if (data[i] < 128) transparent++;
            }
            const ratio = transparent / (total / step);
            const percent = Math.min(100, Math.round(ratio * 100));
            progressEl.textContent = percent + '%';
            if (percent >= REVEAL_THRESHOLD * 100 && !isRevealed && !isUpdating) {
                fullyReveal();
            }
        }

        // ================================================================
        // 🎉 FULLY REVEAL
        // ================================================================

        async function fullyReveal() {
            if (isRevealed || isUpdating) return;

            if (isDateExpired) {
                statusMessage.innerHTML =
                    `<i class="fas fa-times-circle" style="color:#f87171;"></i> This promo has expired.`;
                return;
            }

            isUpdating = true;

            try {
                let latestUsage;
                try {
                    latestUsage = await getPromoUsageFromRTDB(selectedCode);
                } catch (e) {
                    latestUsage = getPromoUsageFromLocal(selectedCode);
                }

                const used = latestUsage.used || 0;
                const maxU = latestUsage.max_uses || promo.max_uses || 100;

                if (used >= maxU) {
                    isUsageExhausted = true;
                    displayPromoInfo(latestUsage, false);
                    statusMessage.innerHTML =
                        `<i class="fas fa-users" style="color:#fbbf24;"></i> This promo is fully used. Cannot scratch.`;
                    isUpdating = false;
                    return;
                }

                const w = canvas.width / (window.devicePixelRatio || 1);
                const h = canvas.height / (window.devicePixelRatio || 1);
                ctx.clearRect(0, 0, w, h);
                progressEl.classList.add('hidden');

                let updatedUsage;
                try {
                    updatedUsage = await updatePromoUsageInRTDB(selectedCode);
                    console.log('✅ DB updated:', updatedUsage);
                } catch (error) {
                    console.error('❌ DB update failed, using localStorage:', error);
                    updatedUsage = updatePromoUsageInLocal(selectedCode);
                }

                // 🔥 Save reveal status to Firebase
                await setRevealedStatus(selectedCode, true);
                isRevealed = true;
                canvas.style.display = 'none';
                justClaimed = true;

                displayPromoInfo(updatedUsage, true);

                if (typeof gtag === 'function') {
                    gtag('event', 'scratch_reveal', {
                        'event_category': 'Promo',
                        'event_label': selectedCode,
                        'value': promo.value
                    });
                }

                cardEl.style.transform = 'scale(1.02)';
                setTimeout(() => { cardEl.style.transform = ''; }, 300);

            } catch (error) {
                console.error('❌ Error in fullyReveal:', error);
            } finally {
                isUpdating = false;
            }
        }

        // ================================================================
        // 📋 COPY
        // ================================================================

        copyBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (copyBtn.disabled) return;
            const code = selectedCode || '';
            if (!code) return;

            if (navigator.clipboard) {
                navigator.clipboard.writeText(code).then(() => {
                    copyBtn.classList.add('copied');
                    copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                    setTimeout(() => {
                        copyBtn.classList.remove('copied');
                        copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
                    }, 2500);
                }).catch(() => {
                    fallbackCopy(code);
                });
            } else {
                fallbackCopy(code);
            }
        });

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            copyBtn.classList.add('copied');
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
            setTimeout(() => {
                copyBtn.classList.remove('copied');
                copyBtn.innerHTML = '<i class="fas fa-copy"></i> Copy';
            }, 2500);
        }

        // ================================================================
        // 🖱️ EVENT LISTENERS
        // ================================================================

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function onStart(e) {
            e.preventDefault();
            if (isRevealed || isUpdating) return;
            if (isDateExpired) {
                statusMessage.innerHTML =
                    `<i class="fas fa-times-circle" style="color:#f87171;"></i> This promo has expired.`;
                return;
            }
            if (isUsageExhausted && !justClaimed) {
                statusMessage.innerHTML =
                    `<i class="fas fa-users" style="color:#fbbf24;"></i> This promo is fully used.`;
                return;
            }
            isDrawing = true;
            const pos = getPos(e);
            scratch(pos.x, pos.y);
        }

        function onMove(e) {
            e.preventDefault();
            if (!isDrawing || isRevealed || isUpdating) return;
            const pos = getPos(e);
            scratch(pos.x, pos.y);
        }

        function onEnd(e) {
            e.preventDefault();
            isDrawing = false;
            if (!isRevealed && !isUpdating) updateProgress();
        }

        canvas.addEventListener('mousedown', onStart);
        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mouseup', onEnd);
        canvas.addEventListener('mouseleave', onEnd);
        canvas.addEventListener('touchstart', onStart, { passive: false });
        canvas.addEventListener('touchmove', onMove, { passive: false });
        canvas.addEventListener('touchend', onEnd, { passive: false });

        window.addEventListener('resize', () => {
            resizeCanvas();
            if (isRevealed) {
                const w = canvas.width / (window.devicePixelRatio || 1);
                const h = canvas.height / (window.devicePixelRatio || 1);
                ctx.clearRect(0, 0, w, h);
            }
        });

        // ================================================================
        // 🚀 INIT
        // ================================================================

        async function init() {
            await loadPromoCode();
            resizeCanvas();
        }

        init();
    </script>
