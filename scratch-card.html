<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch Card</title>
    <style>
        /* ===== CSS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #070b15;
            --bg-surface: #0f172a;
            --bg-card: #1a2338;
            --bg-card-hover: #212d48;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(157, 0, 255, 0.4);
            --primary-neon: #00f0ff;
            --secondary-neon: #ff007f;
            --accent-purple: #9d00ff;
            --accent-gradient: linear-gradient(135deg, var(--secondary-neon), var(--primary-neon));
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 40px rgba(0, 240, 255, 0.15);
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: transparent;
            color: var(--text-primary);
            min-height: auto;
            padding: 0;
            margin: 0;
        }

        .scratch-section {
            padding: 24px 20px 28px;
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .scratch-section::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            height: 2px;
            background: var(--accent-gradient);
            opacity: 0.6;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .scratch-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .scratch-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .scratch-header h3 i {
            -webkit-text-fill-color: initial;
            color: var(--primary-neon);
            font-size: 1.2rem;
        }

        .scratch-badge {
            background: rgba(255, 0, 127, 0.12);
            border: 1px solid rgba(255, 0, 127, 0.2);
            padding: 3px 14px;
            border-radius: 40px;
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--secondary-neon);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .scratch-card-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .scratch-card {
            position: relative;
            width: 340px;
            height: 140px;
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.06), inset 0 0 30px rgba(0, 240, 255, 0.02);
            border: 2px solid var(--border-subtle);
            transition: var(--transition);
            flex-shrink: 0;
            background: var(--bg-card);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .scratch-card:hover {
            border-color: var(--primary-neon);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.12), inset 0 0 40px rgba(0, 240, 255, 0.03);
            transform: scale(1.01);
        }

        .promo-result {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-card);
            padding: 16px;
            z-index: 1;
            text-align: center;
        }

        .promo-result .promo-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 2px;
            font-weight: 500;
        }

        .promo-result .promo-code {
            font-size: 1.9rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            line-height: 1.2;
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.15);
        }

        .promo-result .promo-code.expired {
            background: #ff4444;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .promo-result .promo-value {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
            font-weight: 500;
        }

        .promo-result .promo-value i {
            color: var(--secondary-neon);
            margin-right: 4px;
        }

        .promo-result .promo-expiry {
            font-size: 0.55rem;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        .promo-result .promo-expiry i {
            color: var(--primary-neon);
            margin-right: 4px;
        }

        .promo-uses {
            font-size: 0.55rem;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 0.3px;
        }

        .promo-uses i {
            color: var(--secondary-neon);
            margin-right: 4px;
        }

        #scratchCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            border-radius: var(--radius-md);
            touch-action: none;
            cursor: pointer;
            display: block;
        }

        .scratch-progress {
            position: absolute;
            bottom: 8px;
            right: 10px;
            z-index: 4;
            font-size: 0.55rem;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 500;
            letter-spacing: 0.5px;
            pointer-events: none;
            transition: opacity 0.6s ease;
            font-variant-numeric: tabular-nums;
        }

        .scratch-progress.hidden {
            opacity: 0;
        }

        /* ===== DESCRIPTION ===== */
        .scratch-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            max-width: 260px;
            text-align: center;
            line-height: 1.7;
            background: rgba(0, 240, 255, 0.04);
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(0, 240, 255, 0.08);
            transition: var(--transition);
            min-height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .scratch-desc .desc-icon {
            font-size: 1.3rem;
            display: block;
            margin-bottom: 2px;
        }

        .scratch-desc .desc-main {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.8rem;
        }

        .scratch-desc .desc-divider {
            width: 24px;
            height: 2px;
            background: var(--accent-gradient);
            border-radius: 4px;
            margin: 4px auto;
            opacity: 0.5;
        }

        .scratch-desc .desc-sub {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .scratch-desc .desc-sub i {
            color: var(--secondary-neon);
            margin-right: 4px;
        }

        /* ===== SUCCESS STATE ===== */
        .scratch-desc .desc-success {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            animation: fadeInUp 0.5s ease;
        }

        .scratch-desc .desc-success.show {
            display: flex;
        }

        .scratch-desc .desc-success .success-text {
            font-size: 0.8rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .scratch-desc .desc-success .success-text.expired {
            background: #ff4444;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .scratch-desc .desc-success .success-sub {
            font-size: 0.6rem;
            color: var(--text-secondary);
        }

        .scratch-desc .desc-success .success-sub i {
            color: var(--primary-neon);
            margin-right: 4px;
        }

        /* ===== COPY BUTTON ===== */
        .copy-btn {
            margin-top: 6px;
            padding: 5px 18px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 0.5px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 20px rgba(157, 0, 255, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 30px rgba(157, 0, 255, 0.4);
        }

        .copy-btn:active {
            transform: scale(0.95);
        }

        .copy-btn.copied {
            background: linear-gradient(135deg, #00c851, #007e33);
        }

        .copy-btn.hidden {
            display: none !important;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== LOADING ===== */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: var(--radius-md);
        }

        .loading-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-subtle);
            border-top: 3px solid var(--primary-neon);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-overlay p {
            margin-top: 10px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            .scratch-section {
                padding: 18px 14px 22px;
            }
            .scratch-header h3 {
                font-size: 0.95rem;
            }
            .scratch-card {
                width: 280px;
                height: 120px;
            }
            .promo-result .promo-code {
                font-size: 1.5rem;
            }
            .scratch-badge {
                font-size: 0.45rem;
                padding: 2px 10px;
            }
            .scratch-desc {
                font-size: 0.7rem;
                max-width: 200px;
                padding: 12px 14px;
                min-height: 90px;
            }
            .scratch-progress {
                font-size: 0.45rem;
                bottom: 4px;
                right: 6px;
            }
        }

        @media (max-width: 420px) {
            .scratch-card {
                width: 230px;
                height: 105px;
            }
            .promo-result .promo-code {
                font-size: 1.2rem;
            }
            .promo-result .promo-label {
                font-size: 0.45rem;
            }
            .promo-result .promo-value {
                font-size: 0.6rem;
            }
            .scratch-desc {
                font-size: 0.6rem;
                max-width: 170px;
                padding: 10px 12px;
                min-height: 80px;
            }
            .scratch-desc .desc-success .success-text {
                font-size: 0.65rem;
            }
            .copy-btn {
                font-size: 0.5rem;
                padding: 4px 14px;
            }
        }
    </style>
</head>
<body>
    <div class="scratch-section">
        <div class="scratch-header">
            <h3>
                <i class="fas fa-ticket-alt"></i>
                Lucky Scratch Card
            </h3>
            <span class="scratch-badge"><i class="fas fa-bolt"></i> ခဲခြစ်ပြီး ကံစမ်းပါ</span>
        </div>

        <div class="scratch-card-wrapper">
            <div class="scratch-card" id="scratchCard">
                <!-- Loading Overlay -->
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <p>Loading promo...</p>
                </div>

                <div class="promo-result" id="promoResult">
                    <span class="promo-label"><i class="fas fa-gift"></i> Your Promo Code</span>
                    <span class="promo-code" id="promoCodeDisplay">———</span>
                    <span class="promo-value" id="promoValueDisplay"><i class="fas fa-percent"></i> Loading...</span>
                    <span class="promo-uses" id="promoUsesDisplay">
                        <i class="fas fa-users"></i> Uses: <span id="usesCount">—</span>/<span id="maxUsesCount">—</span>
                    </span>
                    <span class="promo-expiry" id="promoExpiryDisplay"><i class="far fa-calendar-alt"></i> Expires: —</span>
                </div>
                <canvas id="scratchCanvas"></canvas>
                <span class="scratch-progress" id="scratchProgress">0%</span>
            </div>

            <!-- ===== DESCRIPTION ===== -->
            <div class="scratch-desc" id="scratchDesc">
                <!-- Default State -->
                <div id="descDefault">
                    <span class="desc-icon">👇</span>
                    <span class="desc-main">လက်ချောင်းနဲ့ ပွတ်ဆွဲပြီး ခဲခြစ်လိုက်ပါ</span>
                    <span class="desc-divider"></span>
                    <span class="desc-sub">
                        <i class="fas fa-info-circle"></i>
                        တစ်ကြိမ်သာ အသုံးပြုနိုင်သော ပရိုမိုကုဒ်
                    </span>
                </div>

                <!-- Success State -->
                <div class="desc-success" id="descSuccess">
                    <span class="success-text" id="successText">🎉 Promo Code ရပါပြီ!</span>
                    <span class="success-sub" id="successSub"><i class="fas fa-copy"></i> ကူးယူအသုံးပြုပါ</span>
                    <button class="copy-btn" id="copyBtn">
                        <i class="fas fa-copy"></i> ကူယူမည်
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js">
    </script>

    <script>
        // ================================================================
        // 🔥 FIREBASE CONFIG
        // ================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAGsw8OKSeuhkhzPct_0ewvCBM7JcTftj4",
            authDomain: "scratch-card-promo-6883d.firebaseapp.com",
            databaseURL: "https://scratch-card-promo-6883d-default-rtdb.firebaseio.com",
            projectId: "scratch-card-promo-6883d",
            storageBucket: "scratch-card-promo-6883d.firebasestorage.app",
            messagingSenderId: "334910262552",
            appId: "1:334910262552:web:45e2f372d64f6f5166626d"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ================================================================
        // 🎟️ PROMO CODES
        // ================================================================
        const promoCodes = {
            "WELCOME50": { "type": "percent", "value": 50, "label": "50% OFF", "expiry": "2026-12-31",
            "max_uses": 100 },
            "BETA100": { "type": "fixed", "value": 1000, "label": "1000 MMK OFF", "expiry": "2026-08-01",
            "max_uses": 10 },
            "BETA50": { "type": "fixed", "value": 500, "label": "500 MMK OFF", "expiry": "2026-08-01", "max_uses": 10 },
            "FLASH10": { "type": "fixed", "value": 10, "label": "10% OFF", "expiry": "2026-12-31", "max_uses": 100 },
            "VIP1000": { "type": "fixed", "value": 1000, "label": "100% FREE", "expiry": "2026-07-31", "max_uses": 5 },
            "GAMER25": { "type": "percent", "value": 25, "label": "25% OFF", "expiry": "2026-08-01", "max_uses": 10 },
            "FLASH75": { "type": "percent", "value": 75, "label": "75% OFF", "expiry": "2026-12-31", "max_uses": 100 },
            "ARCADE50": { "type": "percent", "value": 50, "label": "50% OFF", "expiry": "2026-12-31", "max_uses": 100 },
        };

        // ================================================================
        // 💾 REVEAL STATUS
        // ================================================================
        function getRevealedStatus(code) {
            return localStorage.getItem('scratch_revealed_' + code) === 'true';
        }

        function setRevealedStatus(code, status) {
            localStorage.setItem('scratch_revealed_' + code, status ? 'true' : 'false');
        }

        // ================================================================
        // 📡 REALTIME DATABASE
        // ================================================================
        async function getPromoUsageFromRTDB(code) {
            try {
                const ref = db.ref('promoCodes/' + code);
                const snapshot = await ref.once('value');
                if (snapshot.exists()) {
                    return snapshot.val();
                } else {
                    const newData = {
                        used: 0,
                        max_uses: promoCodes[code]?.max_uses || 100,
                        createdAt: Date.now()
                    };
                    await ref.set(newData);
                    return newData;
                }
            } catch (error) {
                console.error('❌ Error getting promo usage:', error);
                return getPromoUsageFromLocal(code);
            }
        }

        async function updatePromoUsageInRTDB(code) {
            try {
                const ref = db.ref('promoCodes/' + code);
                return new Promise((resolve, reject) => {
                    ref.transaction((currentData) => {
                        if (currentData === null) {
                            return {
                                used: 1,
                                max_uses: promoCodes[code]?.max_uses || 100,
                                createdAt: Date.now()
                            };
                        }
                        currentData.used = (currentData.used || 0) + 1;
                        currentData.updatedAt = Date.now();
                        return currentData;
                    }, (error, committed, snapshot) => {
                        if (error) { reject(error); return; }
                        if (!committed) { reject(new Error('Transaction not committed')); return; }
                        const data = snapshot.val();
                        resolve({
                            used: data?.used || 1,
                            max_uses: data?.max_uses || promoCodes[code]?.max_uses || 100
                        });
                    });
                });
            } catch (error) {
                console.error('❌ Error updating promo usage:', error);
                return updatePromoUsageInLocal(code);
            }
        }

        // ================================================================
        // 💾 LOCAL STORAGE FALLBACK
        // ================================================================
        function getPromoUsageFromLocal(code) {
            const allData = localStorage.getItem('promo_usage_data');
            let usageData = allData ? JSON.parse(allData) : {};
            if (!usageData[code]) {
                usageData[code] = {
                    used: 0,
                    max_uses: promoCodes[code]?.max_uses || 100
                };
                localStorage.setItem('promo_usage_data', JSON.stringify(usageData));
            }
            return usageData[code];
        }

        function updatePromoUsageInLocal(code) {
            const allData = localStorage.getItem('promo_usage_data');
            let usageData = allData ? JSON.parse(allData) : {};
            if (!usageData[code]) {
                usageData[code] = {
                    used: 0,
                    max_uses: promoCodes[code]?.max_uses || 100
                };
            }
            usageData[code].used += 1;
            localStorage.setItem('promo_usage_data', JSON.stringify(usageData));
            return usageData[code];
        }

        // ================================================================
        // 🎯 DOM REFS
        // ================================================================
        const loadingOverlay = document.getElementById('loadingOverlay');
        const promoCodeDisplay = document.getElementById('promoCodeDisplay');
        const promoValueDisplay = document.getElementById('promoValueDisplay');
        const promoExpiryDisplay = document.getElementById('promoExpiryDisplay');
        const usesCount = document.getElementById('usesCount');
        const maxUsesCount = document.getElementById('maxUsesCount');
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        const progressEl = document.getElementById('scratchProgress');
        const card = document.getElementById('scratchCard');
        const descDefault = document.getElementById('descDefault');
        const descSuccess = document.getElementById('descSuccess');
        const successText = document.getElementById('successText');
        const successSub = document.getElementById('successSub');
        const copyBtn = document.getElementById('copyBtn');

        let selectedCode = null;
        let promo = null;
        let isDrawing = false;
        let isRevealed = false;
        let isUpdating = false;
        let isExpired = false;
        const RADIUS = 28;
        const REVEAL_THRESHOLD = 0.50;

        // ================================================================
        // 🎯 LOAD PROMO
        // ================================================================
        async function loadPromoCode() {
            loadingOverlay.style.display = 'flex';

            let code = localStorage.getItem('myPromoCode');
            if (!code || !promoCodes[code]) {
                const codes = Object.keys(promoCodes);
                code = codes[Math.floor(Math.random() * codes.length)];
                localStorage.setItem('myPromoCode', code);
            } else {
                const codeData = promoCodes[code];
                if (codeData.expiry) {
                    const expiryDate = new Date(codeData.expiry);
                    const today = new Date();
                    if (expiryDate < today) {
                        const codes = Object.keys(promoCodes);
                        code = codes[Math.floor(Math.random() * codes.length)];
                        localStorage.setItem('myPromoCode', code);
                    }
                }
            }

            selectedCode = code;
            promo = promoCodes[selectedCode];

            if (!promo) {
                const codes = Object.keys(promoCodes);
                selectedCode = codes[0];
                promo = promoCodes[selectedCode];
                localStorage.setItem('myPromoCode', selectedCode);
            }

            try {
                const usage = await getPromoUsageFromRTDB(selectedCode);
                displayPromoInfo(usage);
            } catch (error) {
                const usage = getPromoUsageFromLocal(selectedCode);
                displayPromoInfo(usage);
            }

            // Check if already revealed
            if (getRevealedStatus(selectedCode)) {
                isRevealed = true;
                canvas.style.display = 'none';
                progressEl.classList.add('hidden');
                showSuccessState();
            }

            loadingOverlay.style.display = 'none';
        }

        // ================================================================
        // 📋 DISPLAY PROMO INFO
        // ================================================================
        function displayPromoInfo(usage) {
            const used = usage.used || 0;
            const maxUses = usage.max_uses || promo.max_uses || 100;

            promoCodeDisplay.textContent = selectedCode;
            promoValueDisplay.innerHTML = `<i class="fas fa-gift"></i> ${promo.label}`;

            if (promo.expiry) {
                promoExpiryDisplay.innerHTML = `<i class="far fa-calendar-alt"></i> Expires: ${promo.expiry}`;
            } else {
                promoExpiryDisplay.innerHTML = `<i class="far fa-calendar-alt"></i> No expiry`;
            }

            usesCount.textContent = used;
            maxUsesCount.textContent = maxUses;

            // ✅ Check expired
            const expiryDate = promo.expiry ? new Date(promo.expiry) : null;
            const today = new Date();

            if (expiryDate && expiryDate < today) {
                isExpired = true;
                promoCodeDisplay.textContent = '❌ EXPIRED';
                promoCodeDisplay.classList.add('expired');
                promoValueDisplay.innerHTML = '<i class="fas fa-times-circle" style="color:#ff4444;"></i> Promo expired';
            } else if (used >= maxUses) {
                isExpired = true;
                promoCodeDisplay.textContent = '❌ EXPIRED';
                promoCodeDisplay.classList.add('expired');
                promoValueDisplay.innerHTML = '<i class="fas fa-times-circle" style="color:#ff4444;"></i> No more uses left';
            } else {
                isExpired = false;
                promoCodeDisplay.classList.remove('expired');
            }
        }

        // ================================================================
        // 🖌️ CANVAS ENGINE
        // ================================================================
        function resizeCanvas() {
            const rect = card.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            ctx.scale(dpr, dpr);
            drawCover();
        }

        function drawCover() {
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, w, h);

            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, '#1a2338');
            grad.addColorStop(0.5, '#0f172a');
            grad.addColorStop(1, '#1a2338');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            ctx.strokeStyle = 'rgba(0, 240, 255, 0.04)';
            ctx.lineWidth = 1;
            const step = 20;
            for (let x = 0; x < w; x += step) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
                ctx.stroke();
            }
            for (let y = 0; y < h; y += step) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = '600 1.2rem "Inter", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.fillText('🎟️ ခဲခြစ်ပါ', w / 2, h / 2 - 8);
            ctx.font = '400 0.6rem "Inter", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.fillText('scratch to reveal', w / 2, h / 2 + 22);

            const cornerLen = 18;
            const cornerColor = 'rgba(0, 240, 255, 0.15)';
            ctx.strokeStyle = cornerColor;
            ctx.lineWidth = 2;
            const corners = [
                [10, 10, 1, 1],
                [w - 10, 10, -1, 1],
                [10, h - 10, 1, -1],
                [w - 10, h - 10, -1, -1]
            ];
            corners.forEach(([x, y, dx, dy]) => {
                ctx.beginPath();
                ctx.moveTo(x + dx * cornerLen, y);
                ctx.lineTo(x, y);
                ctx.lineTo(x, y + dy * cornerLen);
                ctx.stroke();
            });
        }

        function scratch(x, y) {
            if (isRevealed || isUpdating || isExpired) return;
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            ctx.save();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, RADIUS, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            updateProgress();
        }

        function updateProgress() {
            if (isRevealed || isUpdating) return;
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            let transparent = 0;
            const total = data.length / 4;
            const step = 4;
            for (let i = 3; i < data.length; i += 4 * step) {
                if (data[i] < 128) transparent++;
            }
            const ratio = transparent / (total / step);
            const percent = Math.min(100, Math.round(ratio * 100));
            progressEl.textContent = percent + '%';
            if (percent >= REVEAL_THRESHOLD * 100 && !isRevealed) {
                fullyReveal();
            }
        }

        // ================================================================
        // 🎉 FULLY REVEAL
        // ================================================================
        async function fullyReveal() {
            if (isRevealed || isUpdating || isExpired) return;
            isUpdating = true;
            isRevealed = true;

            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            ctx.clearRect(0, 0, w, h);
            progressEl.classList.add('hidden');

            canvas.style.display = 'none';
            setRevealedStatus(selectedCode, true);

            try {
                const updatedUsage = await updatePromoUsageInRTDB(selectedCode);
                displayPromoInfo(updatedUsage);
            } catch (error) {
                const updatedUsage = updatePromoUsageInLocal(selectedCode);
                displayPromoInfo(updatedUsage);
            }

            showSuccessState();

            card.style.transform = 'scale(1.02)';
            setTimeout(() => { card.style.transform = ''; }, 300);

            if (typeof gtag === 'function') {
                gtag('event', 'scratch_reveal', {
                    'event_category': 'Promo',
                    'event_label': selectedCode,
                    'value': promo.value
                });
            }

            isUpdating = false;
        }

        // ================================================================
        // 🎊 SHOW SUCCESS STATE
        // ================================================================
        function showSuccessState() {
            descDefault.style.display = 'none';
            descSuccess.classList.add('show');

            if (isExpired) {
                // ❌ Expired - Hide copy button
                successText.textContent = '❌ Promo Code သက်တမ်းကုန်သွားပါပြီ';
                successText.className = 'success-text expired';
                successSub.innerHTML = '<i class="fas fa-times-circle"></i> ကျေးဇူးပြု၍ အခြားကတ်တစ်ခု စမ်းကြည့်ပါ';
                copyBtn.classList.add('hidden');
            } else {
                // ✅ Valid - Show copy button
                successText.textContent = '🎉 Promo Code ရပါပြီ!';
                successText.className = 'success-text';
                successSub.innerHTML = '<i class="fas fa-copy"></i> ကူးယူအသုံးပြုပါ';
                copyBtn.classList.remove('hidden');
            }
        }

        // ================================================================
        // 📋 COPY BUTTON
        // ================================================================
        copyBtn.addEventListener('click', async () => {
            if (isExpired) return;
            const code = selectedCode;
            try {
                await navigator.clipboard.writeText(code);
                copyBtn.innerHTML = '<i class="fas fa-check-circle"></i> ကူးပြီးပါပြီ!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> ကူယူမည်';
                    copyBtn.classList.remove('copied');
                }, 2500);
            } catch (err) {
                const textArea = document.createElement('textarea');
                textArea.value = code;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                textArea.remove();
                copyBtn.innerHTML = '<i class="fas fa-check-circle"></i> ကူးပြီးပါပြီ!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> ကူယူမည်';
                    copyBtn.classList.remove('copied');
                }, 2500);
            }
        });

        // ================================================================
        // 🖱️ EVENT LISTENERS
        // ================================================================
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function onStart(e) {
            e.preventDefault();
            if (isRevealed || isUpdating || isExpired) return;
            isDrawing = true;
            const pos = getPos(e);
            scratch(pos.x, pos.y);
        }

        function onMove(e) {
            e.preventDefault();
            if (!isDrawing || isRevealed || isUpdating || isExpired) return;
            const pos = getPos(e);
            scratch(pos.x, pos.y);
        }

        function onEnd(e) {
            e.preventDefault();
            isDrawing = false;
            if (!isRevealed && !isUpdating) updateProgress();
        }

        canvas.addEventListener('mousedown', onStart);
        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mouseup', onEnd);
        canvas.addEventListener('mouseleave', onEnd);
        canvas.addEventListener('touchstart', onStart, { passive: false });
        canvas.addEventListener('touchmove', onMove, { passive: false });
        canvas.addEventListener('touchend', onEnd, { passive: false });

        window.addEventListener('resize', () => {
            resizeCanvas();
            if (isRevealed) {
                const w = canvas.width / (window.devicePixelRatio || 1);
                const h = canvas.height / (window.devicePixelRatio || 1);
                ctx.clearRect(0, 0, w, h);
            }
        });

        // ================================================================
        // 🚀 INIT
        // ================================================================
        async function init() {
            await loadPromoCode();
            resizeCanvas();
        }

        init();
    </script>
</body>
