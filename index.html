<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🛠 Maintenance | Top Flash Games Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .icon-wrapper {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #f7971e, #ffd200);
            /* vendorPrefix fix */
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-text { color: rgba(255, 255, 255, 0.5); margin-bottom: 2rem; }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .timer-box {
            background: rgba(0,0,0,0.3);
            padding: 15px 5px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .number {
            display: block;
            font-size: 2rem;
            font-weight: 700;
            /* vendorPrefix fix */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to bottom, #fff, #aaa);
        }

        .label { font-size: 0.65rem; color: #666; text-transform: uppercase; margin-top: 5px; }

        @media (max-width: 480px) {
            .timer-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-wrapper">🚀</div>
        <h1>Maintenance</h1>
        <p class="sub-text">ကျွန်ုပ်တို့၏ ဝဘ်ဆိုက်ကို ပိုမိုကောင်းမွန်အောင် ပြင်ဆင်နေပါသည်။</p>

        <div class="timer-grid" id="timerGrid">
            <div class="timer-box"><span class="number" id="days">00</span><span class="label">ရက်</span></div>
            <div class="timer-box"><span class="number" id="hours">00</span><span class="label">နာရီ</span></div>
            <div class="timer-box"><span class="number" id="minutes">00</span><span class="label">မိနစ်</span></div>
            <div class="timer-box"><span class="number" id="seconds">00</span><span class="label">စက္ကန့်</span></div>
        </div>
    </div>

    <script>
        const targetDate = new Date('July 11, 2026 23:59:59').getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff <= 0) return;
            
            document.getElementById('days').textContent = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
            document.getElementById('hours').textContent = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            document.getElementById('minutes').textContent = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            document.getElementById('seconds').textContent = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
