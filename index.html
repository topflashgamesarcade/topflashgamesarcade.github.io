<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🛠 Maintenance | Top Flash Games Arcade</title>
    <style>
        /* ============================================================
               BASE RESET & BODY
               ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0b0e;
            color: #fff;
            text-align: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ---- subtle animated background ---- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(247, 151, 30, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(255, 210, 0, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(247, 151, 30, 0.03) 0%, transparent 40%);
            pointer-events: none;
        }

        /* ---- subtle grid overlay ---- */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* ============================================================
               CONTAINER – glass‑morphism
               ============================================================ */
        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            width: 100%;
            padding: 3rem 2.5rem 2.5rem;
            background: rgba(255, 255, 255, 0.025);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            transition: all 0.4s ease;
        }

        .container:hover {
            border-color: rgba(247, 151, 30, 0.12);
            box-shadow:
                0 50px 100px rgba(0, 0, 0, 0.9),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        /* ============================================================
               ICON – floating + spin
               ============================================================ */
        .icon-wrapper {
            display: inline-block;
            font-size: 4.4rem;
            line-height: 1;
            margin-bottom: 0.6rem;
            animation: floatSpin 5s ease-in-out infinite;
            filter: drop-shadow(0 8px 24px rgba(247, 151, 30, 0.15));
        }

        @keyframes floatSpin {
            0% {
                transform: rotate(0deg) scale(1) translateY(0);
            }
            25% {
                transform: rotate(90deg) scale(1.04) translateY(-6px);
            }
            50% {
                transform: rotate(180deg) scale(1) translateY(0);
            }
            75% {
                transform: rotate(270deg) scale(1.04) translateY(-6px);
            }
            100% {
                transform: rotate(360deg) scale(1) translateY(0);
            }
        }

        /* ============================================================
               TYPOGRAPHY
               ============================================================ */
        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f7971e, #ffd200, #f7971e);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
            animation: shimmer 6s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .sub-text {
            font-size: 1.05rem;
            color: rgba(255, 255, 255, 0.55);
            font-weight: 300;
            letter-spacing: 0.3px;
            margin-bottom: 0.1rem;
        }

        .sub-text.highlight {
            font-size: 0.92rem;
            color: rgba(255, 255, 255, 0.22);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .divider {
            width: 80px;
            height: 2px;
            margin: 1.6rem auto 1.4rem;
            background: linear-gradient(90deg, transparent, rgba(247, 151, 30, 0.5), transparent);
            border-radius: 10px;
        }

        /* ============================================================
               TIMER GRID – glass cards
               ============================================================ */
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem;
            margin: 1.6rem 0 0.2rem;
        }

        .timer-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.2rem 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        /* subtle glow on hover */
        .timer-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            opacity: 0;
            background: radial-gradient(circle at 50% 0%, rgba(247, 151, 30, 0.06), transparent 70%);
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .timer-box:hover::before {
            opacity: 1;
        }

        .timer-box:hover {
            border-color: rgba(247, 151, 30, 0.2);
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        .timer-box .number {
            display: block;
            font-size: 3rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
            line-height: 1.15;
            background: linear-gradient(135deg, #ffffff 30%, #f7971e);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 0.3s ease;
        }

        .timer-box:hover .number {
            background: linear-gradient(135deg, #ffffff 20%, #ffd200);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer-box .label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: rgba(255, 255, 255, 0.25);
            margin-top: 6px;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .timer-box:hover .label {
            color: rgba(255, 255, 255, 0.45);
        }

        /* ============================================================
               FOOTER
               ============================================================ */
        .footer-note {
            margin-top: 2.2rem;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.08);
            font-weight: 400;
        }

        .footer-note span {
            color: rgba(255, 255, 255, 0.15);
            margin: 0 4px;
        }

        .footer-note .accent {
            color: rgba(247, 151, 30, 0.2);
        }

        /* ============================================================
               RESPONSIVE
               ============================================================ */
        @media (max-width: 600px) {
            .container {
                padding: 2rem 1.2rem 1.8rem;
                border-radius: 32px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .icon-wrapper {
                font-size: 3.4rem;
            }

            .timer-grid {
                gap: 0.8rem;
            }

            .timer-box .number {
                font-size: 2.2rem;
            }

            .timer-box {
                padding: 1rem 0.3rem 0.8rem;
                border-radius: 16px;
            }

            .timer-box .label {
                font-size: 0.6rem;
                letter-spacing: 1.8px;
            }

            .sub-text {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 420px) {
            .container {
                padding: 1.6rem 1rem 1.4rem;
                border-radius: 24px;
            }

            h1 {
                font-size: 1.7rem;
            }

            .icon-wrapper {
                font-size: 2.8rem;
            }

            .timer-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.6rem;
            }

            .timer-box .number {
                font-size: 2rem;
            }

            .timer-box {
                padding: 0.9rem 0.2rem 0.7rem;
            }

            .divider {
                width: 56px;
                margin: 1.2rem auto;
            }

            .sub-text {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 340px) {
            .timer-grid {
                gap: 0.4rem;
            }
            .timer-box .number {
                font-size: 1.5rem;
            }
            .timer-box .label {
                font-size: 0.5rem;
                letter-spacing: 1px;
            }
            h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Spinning Icon -->
        <div class="icon-wrapper">🔧</div>

        <!-- Title -->
        <h1>ပြုပြင်နေပါသည်</h1>
        <p class="sub-text">
            ပိုမိုကောင်းမွန်သော အတွေ့အကြုံအတွက် ပြင်ဆင်နေပါသည်
        </p>
        <p class="sub-text highlight">
            ခေတ္တစောင့်ဆိုင်းပေးပါ။ မကြာမီ ပြန်လည်ဖွင့်လှစ်ပါမည်
        </p>

        <div class="divider"></div>

        <!-- ===== COUNTDOWN TIMER ===== -->
        <div class="timer-grid" id="timerGrid">
            <div class="timer-box">
                <span class="number" id="days">00</span>
                <span class="label">ရက်များ</span>
            </div>
            <div class="timer-box">
                <span class="number" id="hours">00</span>
                <span class="label">နာရီ</span>
            </div>
            <div class="timer-box">
                <span class="number" id="minutes">00</span>
                <span class="label">မိနစ်</span>
            </div>
            <div class="timer-box">
                <span class="number" id="seconds">00</span>
                <span class="label">စက္ကန့်</span>
            </div>
        </div>

        <div class="footer-note">
            <span>✦</span> TOP FLASH GAMES ARCADE <span>✦</span>
            <span class="accent">·</span>
            <span class="accent">coming soon</span>
        </div>
    </div>

    <!-- ===== JAVASCRIPT COUNTDOWN ===== -->
    <script>
        (function() {
            // =========================================================
            // ★★  ပြန်ဖွင့်မယ့် ရက်စွဲကို ဒီမှာ ပြင်ထည့်ပါ ★★
            //     ဥပမာ – ၂၀၂၆ ခုနှစ်၊ ဇူလိုင်လ ၁၁ ရက်၊ ညနေ ၅ နာရီ
            //     const targetDate = new Date('July 11, 2026 17:00:00').getTime();
            // =========================================================
            const targetDate = new Date('July 11, 2026 23:59:59').getTime();

            const daysEl = document.getElementById('days');
            const hoursEl = document.getElementById('hours');
            const minutesEl = document.getElementById('minutes');
            const secondsEl = document.getElementById('seconds');

            // optional: reference to sub-text for "opened" message
            const subTextEl = document.querySelector('.sub-text.highlight');

            function padZero(num) {
                return String(num).padStart(2, '0');
            }

            function updateTimer() {
                const now = Date.now();
                let diff = targetDate - now;

                // Timer ကုန်သွားရင် "ပြန်ဖွင့်ပြီ" ပြမယ်
                if (diff <= 0) {
                    daysEl.textContent = '00';
                    hoursEl.textContent = '00';
                    minutesEl.textContent = '00';
                    secondsEl.textContent = '00';
                    if (subTextEl) {
                        subTextEl.innerHTML = '🎉 ပြန်လည်ဖွင့်လှစ်ပြီးပါပြီ။ အားလုံးကိုကြိုဆိုပါတယ်!';
                        subTextEl.style.color = 'rgba(247,151,30,0.7)';
                    }
                    return;
                }

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                daysEl.textContent = padZero(days);
                hoursEl.textContent = padZero(hours);
                minutesEl.textContent = padZero(minutes);
                secondsEl.textContent = padZero(seconds);
            }

            updateTimer();
            setInterval(updateTimer, 1000);
        })();
    </script>

</body>
</html>
