<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Nook — ချတ်</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <style>
        /* ===== CSS ပြောင်းလဲနိုင်သော တန်ဖိုးများ ===== */
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --primary-gradient: linear-gradient(135deg, #1a73e8, #0d47a1);
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --card-border: #e4e6eb;
            --text-primary: #1a1a2e;
            --text-secondary: #44464b;
            --text-muted: #8a8a8a;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-full: 50px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --header-height: 60px;
            --danger: #ea4335;
            --online-green: #31a24c;
            --offline-gray: #8a8d91;
        }

        [data-theme="dark"] {
            --bg: #18191a;
            --card-bg: #242526;
            --card-border: #3e4042;
            --text-primary: #e4e6eb;
            --text-secondary: #b0b3b8;
            --text-muted: #8a8d91;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== အကောင့်ဝင်ခြင်း (Auth) ===== */
        .auth-section {
            max-width: 400px;
            margin: 80px auto;
            padding: 32px 28px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--card-border);
            text-align: center;
        }
        .auth-section .logo {
            font-size: 28px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .auth-section .sub {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .auth-section .form-group {
            margin-bottom: 14px;
            text-align: left;
        }
        .auth-section .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .auth-section .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--card-border);
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 15px;
            background: var(--bg);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }
        .auth-section .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
        }
        .auth-section .btn-primary {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--primary-gradient);
            color: #fff;
            font-family: var(--font);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 16px rgba(26, 115, 232, 0.25);
            margin-top: 6px;
        }
        .auth-section .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(26, 115, 232, 0.35);
        }
        .auth-error {
            background: rgba(234, 67, 53, 0.1);
            color: #ea4335;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            margin-bottom: 14px;
            display: none;
        }
        .auth-error.show {
            display: block;
        }

        /* ===== ချတ်အက်ပ် (Chat App) ===== */
        #chat-app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }
        #chat-app.show {
            display: flex;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--card-border);
            height: var(--header-height);
            flex-shrink: 0;
            box-shadow: var(--shadow);
            z-index: 10;
        }
        .chat-header .brand {
            font-size: 20px;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .chat-header .brand i {
            -webkit-text-fill-color: var(--primary);
            color: var(--primary);
        }
        .chat-header .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header .header-actions .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .chat-header .header-actions .user-badge .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            overflow: hidden;
            flex-shrink: 0;
        }
        .chat-header .header-actions .user-badge .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-header .header-actions button {
            padding: 6px 14px;
            border: none;
            border-radius: var(--radius-full);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg);
            color: var(--text-muted);
        }
        .chat-header .header-actions button:hover {
            background: var(--danger);
            color: #fff;
        }
        .theme-toggle {
            background: none !important;
            border: none !important;
            font-size: 20px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
        }
        .theme-toggle:hover {
            background: var(--bg) !important;
            color: var(--text-primary) !important;
        }
        .back-home {
            background: none !important;
            border: none !important;
            font-size: 18px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
        }
        .back-home:hover {
            background: var(--bg) !important;
            color: var(--primary) !important;
        }

        .chat-main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== ဘယ်ဘက် ဆိုက်ဘား (Contacts Sidebar) ===== */
        .contacts-sidebar {
            width: 320px;
            background: var(--card-bg);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }
        .contacts-sidebar .search-box {
            padding: 12px 16px;
            border-bottom: 1px solid var(--card-border);
            flex-shrink: 0;
        }
        .contacts-sidebar .search-box input {
            width: 100%;
            padding: 8px 14px;
            border: none;
            border-radius: var(--radius-full);
            background: var(--bg);
            font-family: var(--font);
            font-size: 14px;
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .contacts-sidebar .search-box input:focus {
            border-color: var(--primary);
        }
        .contacts-sidebar .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid var(--card-border);
            position: relative;
        }
        .contact-item:hover {
            background: var(--bg);
        }
        .contact-item.active {
            background: rgba(26, 115, 232, 0.08);
            border-left: 3px solid var(--primary);
        }
        [data-theme="dark"] .contact-item.active {
            background: rgba(26, 115, 232, 0.15);
        }

        /* ===== Online/Offline အခြေအနေ အစက် (Status Dot) ===== */
        .contact-item .avatar-wrap {
            position: relative;
            flex-shrink: 0;
            width: 40px;
            height: 40px;
        }
        .contact-item .avatar-wrap .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            text-transform: uppercase;
            overflow: hidden;
        }
        .contact-item .avatar-wrap .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .status-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--card-bg);
            background: var(--offline-gray);
            transition: background 0.3s;
        }
        .status-dot.online {
            background: var(--online-green);
        }

        .contact-item .info {
            flex: 1;
            min-width: 0;
        }
        .contact-item .info .name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .contact-item .info .name .verified-badge {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 9px;
            line-height: 16px;
            text-align: center;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(26, 115, 232, 0.3);
        }
        .contact-item .info .name .verified-badge i {
            font-size: 8px;
            vertical-align: middle;
        }
        .contact-item .info .last-msg {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .contact-item .time {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .contact-item .unread-badge {
            background: var(--primary);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            margin-left: auto;
        }

        /* ===== ညာဘက် စကားပြောခန်း (Messages Area) ===== */
        .messages-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }
        .messages-area .chat-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }
        .messages-area .chat-placeholder i {
            font-size: 48px;
            opacity: 0.3;
            margin-bottom: 12px;
        }
        .messages-area .chat-placeholder h3 {
            color: var(--text-secondary);
            font-weight: 600;
        }

        .messages-area .chat-user-header {
            padding: 12px 20px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            min-height: 60px;
        }
        .messages-area .chat-user-header .avatar-wrap {
            position: relative;
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }
        .messages-area .chat-user-header .avatar-wrap .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            overflow: hidden;
        }
        .messages-area .chat-user-header .avatar-wrap .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .messages-area .chat-user-header .avatar-wrap .status-dot {
            width: 10px;
            height: 10px;
            border-width: 2px;
        }
        .messages-area .chat-user-header .user-info {
            display: flex;
            flex-direction: column;
        }
        .messages-area .chat-user-header .name {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .messages-area .chat-user-header .name .verified-badge {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 9px;
            line-height: 16px;
            text-align: center;
            margin-left: 4px;
            box-shadow: 0 2px 6px rgba(26, 115, 232, 0.3);
        }
        .messages-area .chat-user-header .name .verified-badge i {
            font-size: 8px;
            vertical-align: middle;
        }
        .messages-area .chat-user-header .user-status {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
        }
        .messages-area .chat-user-header .user-status.online {
            color: var(--online-green);
        }

        .messages-area .messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .message-item {
            max-width: 75%;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
        }
        .message-item.sent {
            align-self: flex-end;
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message-item.received {
            align-self: flex-start;
            background: var(--card-bg);
            color: var(--text-secondary);
            border: 1px solid var(--card-border);
            border-bottom-left-radius: 4px;
        }
        .message-item .time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 2px;
            display: block;
            text-align: right;
        }
        .message-item.sent .time {
            color: rgba(255, 255, 255, 0.8);
        }
        .message-item.received .time {
            color: var(--text-muted);
        }

        .messages-area .message-input-wrap {
            padding: 12px 16px;
            background: var(--card-bg);
            border-top: 1px solid var(--card-border);
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .messages-area .message-input-wrap input {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-full);
            background: var(--bg);
            font-family: var(--font);
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            border: 1px solid transparent;
            transition: var(--transition);
        }
        .messages-area .message-input-wrap input:focus {
            border-color: var(--primary);
        }
        .messages-area .message-input-wrap button {
            padding: 10px 18px;
            border: none;
            border-radius: var(--radius-full);
            background: var(--primary-gradient);
            color: #fff;
            font-family: var(--font);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .messages-area .message-input-wrap button:hover {
            transform: scale(1.03);
        }
        .messages-area .message-input-wrap button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== မိုဘိုင်းအတွက် တုံ့ပြန်မှု (Responsive) ===== */
        @media (max-width: 640px) {
            .contacts-sidebar {
                width: 100%;
                max-height: 45vh;
                border-right: none;
                border-bottom: 1px solid var(--card-border);
            }
            .chat-main {
                flex-direction: column;
            }
            .messages-area .messages-list {
                padding: 12px;
            }
            .message-item {
                max-width: 85%;
                font-size: 14px;
            }
            .chat-header .brand span {
                display: none;
            }
        }
        @media (max-width: 480px) {
            .contacts-sidebar {
                max-height: 35vh;
            }
            .contact-item {
                padding: 8px 12px;
            }
            .messages-area .message-input-wrap {
                padding: 8px 10px;
            }
            .messages-area .message-input-wrap input {
                font-size: 14px;
                padding: 8px 12px;
            }
            .messages-area .message-input-wrap button {
                font-size: 13px;
                padding: 8px 14px;
            }
        }

        /* ===== Scrollbar ===== */
        .contacts-list::-webkit-scrollbar,
        .messages-list::-webkit-scrollbar {
            width: 4px;
        }
        .contacts-list::-webkit-scrollbar-thumb,
        .messages-list::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }
        .contacts-list::-webkit-scrollbar-track,
        .messages-list::-webkit-scrollbar-track {
            background: transparent;
        }

        /* ===== Toast အသိပေးချက် ===== */
        #toast-container {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            max-width: 92%;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--text-primary);
            color: #fff;
        }
        .toast.error {
            background: #ea4335;
        }
        .toast.success {
            background: #0f9d58;
        }
        .toast.info {
            background: var(--primary);
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .contacts-loading {
            text-align: center;
            padding: 30px 16px;
            color: var(--text-muted);
        }
        .contacts-loading i {
            display: block;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .empty-state {
            text-align: center;
            padding: 30px 16px;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 28px;
            opacity: 0.3;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- Toast ပြတင်းပေါက် -->
        <div id="toast-container"></div>

        <!-- ===== အကောင့်ဝင်ခြင်း အပိုင်း ===== -->
        <div id="auth-section" class="auth-section">
            <div class="logo"><i class="fas fa-comment-dots" style="margin-right:8px;"></i>My Nook ချတ်</div>
            <div class="sub">သူငယ်ချင်းများနှင့် ချိတ်ဆက်ပါ</div>
            <div id="auth-error" class="auth-error"></div>
            <div class="form-group">
                <label>အီးမေးလ်</label>
                <input type="email" id="login-email" placeholder="သင့်အီးမေးလ်" />
            </div>
            <div class="form-group">
                <label>စကားဝှက်</label>
                <input type="password" id="login-password" placeholder="••••••••" />
            </div>
            <button class="btn-primary" id="login-btn"><i class="fas fa-sign-in-alt"></i> ဝင်မည်</button>
            <div style="margin-top:12px;font-size:13px;color:var(--text-muted);">
                အကောင့်မရှိသေးဘူးလား? <a href="mynook.html" style="color:var(--primary);font-weight:600;text-decoration:none;">စာရင်းသွင်းပါ</a>
            </div>
        </div>

        <!-- ===== ချတ်အက်ပ် အပိုင်း ===== -->
        <div id="chat-app">
            <!-- ထိပ်ပိုင်း ဘား (Header) -->
            <div class="chat-header">
                <div class="brand">
                    <i class="fas fa-comment-dots"></i>
                    <span>My Nook ချတ်</span>

    <!-- ============================================================ -->
    <!-- Firebase နှင့် အဓိက လုပ်ဆောင်ချက်များ (JavaScript) -->
    <!-- ============================================================ -->
    <script type="module">
        // Firebase စာကြည့်တိုက်များ သွင်းခြင်း
        import { initializeApp } from 'firebase/app';
        import {
            getAuth,
            signInWithEmailAndPassword,
            onAuthStateChanged,
            signOut
        } from 'firebase/auth';
        import {
            getFirestore,
            collection,
            query,
            where,
            orderBy,
            onSnapshot,
            doc,
            getDoc,
            getDocs,
            addDoc,
            updateDoc,
            serverTimestamp,
            setDoc,
            writeBatch
        } from 'firebase/firestore';

        // ============================================================
        // Firebase ပြင်ဆင်မှု (Config)
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC21SJE6vYiN98dE7CjQ8lUV0sSI6NpGZA",
            authDomain: "friends-35ec0.firebaseapp.com",
            projectId: "friends-35ec0",
            storageBucket: "friends-35ec0.firebasestorage.app",
            messagingSenderId: "720591151304",
            appId: "1:720591151304:web:0b737361c3ab5096cc05fd",
            measurementId: "G-991WRLSCPN"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ============================================================
        // HTML ဒြပ်စင်များ (DOM Refs)
        // ============================================================
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        const authSection = $('#auth-section');
        const chatApp = $('#chat-app');
        const authError = $('#auth-error');
        const loginEmail = $('#login-email');
        const loginPassword = $('#login-password');
        const loginBtn = $('#login-btn');
        const logoutBtn = $('#logout-btn');
        const backHome = $('#back-home');
        const themeToggle = $('#theme-toggle');
        const navUsername = $('#nav-username');
        const navAvatar = $('#nav-avatar');
        const navAvatarText = $('#nav-avatar-text');

        const contactsList = $('#contacts-list');
        const searchInput = $('#search-contacts');
        const messagesList = $('#messages-list');
        const messageInput = $('#message-input');
        const sendBtn = $('#send-btn');
        const chatPlaceholder = $('#chat-placeholder');
        const chatActive = $('#chat-active');
        const chatUserName = $('#chat-user-name');
        const chatUserAvatar = $('#chat-user-avatar');
        const chatUserStatus = $('#chat-user-status');
        const chatHeaderStatusDot = $('#chat-header-status-dot');
        const toastContainer = $('#toast-container');

        // ============================================================
        // အခြေအနေ သိမ်းဆည်းခြင်း (State)
        // ============================================================
        let currentUser = null;
        let currentUserData = { displayName: 'အသုံးပြုသူ', photoURL: '', uid: '', verified: false };
        let allUsers = {}; // uid -> userData
        let activeChatId = null;
        let activeChatPartnerUid = null;
        let unsubscribeMessages = null;
        let unsubscribeContacts = null;
        let isAuthReady = false;
        let pendingTargetUser = null;
        let isSending = false;
        let presenceInterval = null; // အွန်လိုင်းနေရန် အချိန်ပိုင်း

        // ============================================================
        // Toast အသိပေးချက်
        // ============================================================
        function showToast(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
            toast.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${msg}`;
            toastContainer.appendChild(toast);
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        // ============================================================
        // အမှောင်/အလင်း အပြောင်းအလဲ (Theme)
        // ============================================================
        let darkMode = localStorage.getItem('nook-chat-theme') === 'dark';
        if (darkMode) document.documentElement.setAttribute('data-theme', 'dark');
        themeToggle.innerHTML = darkMode ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';

        themeToggle.addEventListener('click', () => {
            darkMode = !darkMode;
            document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
            localStorage.setItem('nook-chat-theme', darkMode ? 'dark' : 'light');
            themeToggle.innerHTML = darkMode ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        });

        // ============================================================
        // အကူပြုလုပ်ဆောင်ချက်များ (Helpers)
        // ============================================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(date) {
            if (!date) return '';
            const d = date.toDate ? date.toDate() : new Date(date);
            if (isNaN(d)) return '';
            const now = new Date();
            const diff = Math.floor((now - d) / 1000);
            if (diff < 60) return 'အခုလေးတင်';
            if (diff < 3600) return `${Math.floor(diff / 60)} မိနစ်`;
            if (diff < 86400) return `${Math.floor(diff / 3600)} နာရီ`;
            if (diff < 604800) return `${Math.floor(diff / 86400)} ရက်`;
            return d.toLocaleDateString('my-MM', { month: 'short', day: 'numeric' });
        }

        function getChatId(uid1, uid2) {
            return uid1 < uid2 ? uid1 + '_' + uid2 : uid2 + '_' + uid1;
        }

        function renderVerifiedBadge(isVerified) {
            if (!isVerified) return '';
            return `<span class="verified-badge"><i class="fas fa-check"></i></span>`;
        }

        function setAvatarElement(el, photoURL, name) {
            const img = el.querySelector('img');
            const span = el.querySelector('span');
            const initial = (name || 'U').charAt(0).toUpperCase();
            if (photoURL) {
                if (img) {
                    img.src = photoURL;
                    img.style.display = 'block';
                    if (span) span.style.display = 'none';
                } else {
                    el.innerHTML = `<img src="${photoURL}" alt="${escapeHtml(name)}" />`;
                }
            } else {
                if (img) { img.style.display = 'none'; }
                if (span) { span.style.display = 'block';
                    span.textContent = initial; } else {
                    el.innerHTML = `<span>${initial}</span>`;
                }
            }
        }

        // ============================================================
        // အွန်လိုင်း/အော့ဖ်လိုင်း အခြေအနေ သတ်မှတ်ခြင်း (Presence)
        // ============================================================
        async function updatePresence(isOnline) {
            if (!currentUser) return;
            try {
                const userRef = doc(db, 'users', currentUser.uid);
                await updateDoc(userRef, {
                    online: isOnline,
                    lastSeen: serverTimestamp()
                });
            } catch (err) {
                // အမှားရှိရင်လည်း ဆက်လုပ်ပါ
            }
        }

        function setupPresence() {
            // အခါအားလျော်စွာ အသက်ရှင်နေကြောင်း အချက်ပြခြင်း (ဥပမာ ၃၀ စက္ကန့်)
            if (presenceInterval) clearInterval(presenceInterval);
            presenceInterval = setInterval(() => {
                if (currentUser && document.visibilityState === 'visible') {
                    updatePresence(true);
                }
            }, 30000); // 30 sec

            // Tab ပြောင်းခြင်း / ပိတ်ခြင်း အခြေအနေများ
            const handleVisibilityChange = () => {
                if (document.hidden) {
                    // ကိုယ်က တဘ်ကိုပိတ် သို့မဟုတ် အခြားတဘ်သို့ပြောင်းသွား
                    updatePresence(false);
                } else {
                    // ပြန်ဝင်လာ
                    updatePresence(true);
                }
            };

            const handleBeforeUnload = () => {
                updatePresence(false);
                if (presenceInterval) clearInterval(presenceInterval);
            };

            document.addEventListener('visibilitychange', handleVisibilityChange);
            window.addEventListener('beforeunload', handleBeforeUnload);

            // စာမျက်နှာစတင်ဖွင့်ချိန်တွင် အွန်လိုင်းဖြစ်အောင်လုပ်
            updatePresence(true);
        }

        // ============================================================
        // အကောင့်ဝင်ခြင်း ဆိုင်ရာ (Auth Functions)
        // ============================================================
        function showAuthError(msg) {
            authError.textContent = msg;
            authError.classList.add('show');
        }

        function hideAuthError() {
            authError.classList.remove('show');
        }

        loginBtn.addEventListener('click', async () => {
            hideAuthError();
            const email = loginEmail.value.trim();
            const pass = loginPassword.value.trim();
            if (!email || !pass) { showAuthError('ကျေးဇူးပြု၍ အီးမေးလ်နှင့် စကားဝှက် ထည့်ပါ။'); return; }
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ဝင်နေသည်...';
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                showAuthError(err.message);
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> ဝင်မည်';
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await updatePresence(false);
            await signOut(auth);
            showToast('ထွက်သွားပါပြီ။', 'info');
        });

        loginPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginBtn.click(); });
        loginEmail.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginBtn.click(); });

        backHome.addEventListener('click', () => {
            window.location.href = 'mynook.html';
        });

        // ============================================================
        // အသုံးပြုသူစာရွက် သေချာရှိစေရန် (Ensure User Doc)
        // ============================================================
        async function ensureUserDocument(user) {
            if (!user) return null;
            const userRef = doc(db, 'users', user.uid);
            const snap = await getDoc(userRef);
            if (snap.exists()) {
                const data = snap.data();
                return {
                    uid: user.uid,
                    displayName: data.displayName || user.displayName || user.email?.split('@')[0] || 'အသုံးပြုသူ',
                    photoURL: data.photoURL || user.photoURL || '',
                    verified: data.verified || false,
                    email: data.email || user.email || '',
                    online: data.online || false,
                    lastSeen: data.lastSeen || null
                };
            } else {
                const displayName = user.displayName || user.email?.split('@')[0] || 'အသုံးပြုသူ';
                const newUser = {
                    displayName: displayName,
                    photoURL: user.photoURL || '',
                    email: user.email || '',
                    verified: false,
                    online: true,
                    lastSeen: serverTimestamp(),
                    createdAt: serverTimestamp()
                };
                await setDoc(userRef, newUser);
                return {
                    uid: user.uid,
                    displayName: displayName,
                    photoURL: user.photoURL || '',
                    verified: false,
                    email: user.email || '',
                    online: true,
                    lastSeen: new Date()
                };
            }
        }

        // ============================================================
        // အကောင့်ဝင်ပြီးနောက် အခြေအနေ (Auth State)
        // ============================================================
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userData = await ensureUserDocument(user);
                    if (userData) {
                        currentUserData = userData;
                        currentUser = user;
                        isAuthReady = true;
                        authSection.style.display = 'none';
                        chatApp.classList.add('show');
                        navUsername.textContent = currentUserData.displayName;
                        setAvatarElement(navAvatar, currentUserData.photoURL, currentUserData.displayName);

                        // အွန်လိုင်း အခြေအနေ စတင်ခြင်း
                        setupPresence();

                        // ဆက်သွယ်သူများ ဖွင့်ခြင်း
                        loadContacts();

                        // URL မှ user parameter ရှိရင် ဖွင့်ပေးခြင်း
                        if (pendingTargetUser) {
                            const targetUid = pendingTargetUser;
                            if (allUsers[targetUid]) {
                                setTimeout(() => openChat(targetUid, getChatId(currentUser.uid, targetUid)), 500);
                            } else {
                                const waitForUser = setInterval(() => {
                                    if (allUsers[targetUid]) {
                                        clearInterval(waitForUser);
                                        openChat(targetUid, getChatId(currentUser.uid, targetUid));
                                    }
                                }, 300);
                                setTimeout(() => clearInterval(waitForUser), 8000);
                            }
                            pendingTargetUser = null;
                        }
                    } else {
                        throw new Error('အသုံးပြုသူဒေတာ ရယူရန် မအောင်မြင်ပါ');
                    }
                } catch (err) {
                    console.error('အကောင့်ဝင်ချိန် အမှား:', err);
                    showToast('ပရိုဖိုင် ဖွင့်ရာတွင် အမှားရှိသည်: ' + err.message, 'error');
                }
            } else {
                // အကောင့်မဝင်တော့ပါ
                currentUser = null;
                currentUserData = { displayName: 'အသုံးပြုသူ', photoURL: '', uid: '', verified: false };
                isAuthReady = false;
                if (presenceInterval) clearInterval(presenceInterval);
                authSection.style.display = 'block';
                chatApp.classList.remove('show');
                if (unsubscribeContacts) { unsubscribeContacts();
                    unsubscribeContacts = null; }
                if (unsubscribeMessages) { unsubscribeMessages();
                    unsubscribeMessages = null; }
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> ဝင်မည်';
                allUsers = {};
                contactsList.innerHTML = `
                    <div class="contacts-loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        အသုံးပြုသူများ ဖွင့်နေသည်...
                    </div>
                `;
            }
        });

        // ============================================================
        // ဆက်သွယ်သူများ ဖွင့်ခြင်း (Load Contacts)
        // ============================================================
        function loadContacts() {
            if (unsubscribeContacts) {
                unsubscribeContacts();
                unsubscribeContacts = null;
            }

            const q = query(collection(db, 'users'));

            unsubscribeContacts = onSnapshot(q, (snapshot) => {
                const users = {};
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    if (docSnap.id !== currentUser.uid) {
                        users[docSnap.id] = {
                            uid: docSnap.id,
                            displayName: data.displayName || 'အသုံးပြုသူ',
                            photoURL: data.photoURL || '',
                            verified: data.verified || false,
                            email: data.email || '',
                            online: data.online || false,
                            lastSeen: data.lastSeen || null
                        };
                    }
                });
                allUsers = users;
                renderContactsWithLastMessages(users);
            }, (err) => {
                console.error('ဆက်သွယ်သူများ အမှား:', err);
                if (err.code === 'permission-denied') {
                    contactsList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-lock"></i>
                            <p>ခွင့်ပြုချက် မရှိပါ။ Firestore စည်းမျဉ်းများကို စစ်ဆေးပါ။</p>
                        </div>
                    `;
                    showToast('အသုံးပြုသူများ ဖွင့်၍မရပါ။ Firestore စည်းမျဉ်းကို စစ်ဆေးပါ။', 'error');
                } else {
                    contactsList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>ဖွင့်ရာတွင် အမှားရှိသည်: ${err.message}</p>
                        </div>
                    `;
                    showToast('ဆက်သွယ်သူများ ဖွင့်ရာတွင် အမှား: ' + err.message, 'error');
                }
            });
        }

        // ============================================================
        // ဆက်သွယ်သူများကို နောက်ဆုံးစာနှင့်တွဲဖော်ပြခြင်း
        // ============================================================
        async function renderContactsWithLastMessages(users) {
            const contactList = [];
            for (const [uid, user] of Object.entries(users)) {
                const chatId = getChatId(currentUser.uid, uid);
                let lastMsg = '';
                let lastTime = null;
                let unread = 0;

                try {
                    const chatRef = doc(db, 'chats', chatId);
                    const chatSnap = await getDoc(chatRef);
                    if (chatSnap.exists()) {
                        const data = chatSnap.data();
                        lastMsg = data.lastMessage || '';
                        lastTime = data.lastUpdated?.toDate?.() || null;
                    }
                    try {
                        const msgsRef = collection(db, 'chats', chatId, 'messages');
                        const qUnread = query(msgsRef,
                            where('receiverId', '==', currentUser.uid),
                            where('read', '==', false)
                        );
                        const unreadSnap = await getDocs(qUnread);
                        unread = unreadSnap.size;
                    } catch (e) { /* ဂရုမစိုက်ပါ */ }
                } catch (err) { /* ဂရုမစိုက်ပါ */ }

                contactList.push({
                    ...user,
                    lastMsg,
                    lastTime,
                    unread,
                    chatId
                });
            }

            contactList.sort((a, b) => {
                if (!a.lastTime && !b.lastTime) return 0;
                if (!a.lastTime) return 1;
                if (!b.lastTime) return -1;
                return b.lastTime - a.lastTime;
            });

            renderContacts(contactList);
        }

        // ============================================================
        // ဆက်သွယ်သူများ UI ဆွဲခြင်း (Render Contacts)
        // ============================================================
        function renderContacts(contacts) {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const filtered = contacts.filter(c =>
                c.displayName.toLowerCase().includes(searchTerm)
            );

            if (filtered.length === 0) {
                contactsList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-user-slash"></i>
                        <p>${searchTerm ? `"${escapeHtml(searchTerm)}" နှင့်ကိုက်ညီသော သူမရှိပါ` : 'အသုံးပြုသူ မရှိပါ'}</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach(c => {
                const initial = c.displayName.charAt(0).toUpperCase();
                const avatarHtml = c.photoURL ?
                    `<img src="${c.photoURL}" alt="${escapeHtml(c.displayName)}" />` :
                    `<span>${initial}</span>`;
                const isActive = activeChatPartnerUid === c.uid;
                const timeStr = c.lastTime ? formatTime(c.lastTime) : '';
                const statusClass = c.online ? 'online' : 'offline';

                html += `
                    <div class="contact-item ${isActive ? 'active' : ''}" data-uid="${c.uid}" data-chatid="${c.chatId}">
                        <div class="avatar-wrap">
                            <div class="avatar">${avatarHtml}</div>
                            <div class="status-dot ${statusClass}"></div>
                        </div>
                        <div class="info">
                            <div class="name">${escapeHtml(c.displayName)} ${renderVerifiedBadge(c.verified)}</div>
                            <div class="last-msg">${escapeHtml(c.lastMsg || 'စာမရှိသေးပါ')}</div>
                        </div>
                        <div class="time">${timeStr}</div>
                        ${c.unread > 0 ? `<div class="unread-badge">${c.unread}</div>` : ''}
                    </div>
                `;
            });
            contactsList.innerHTML = html;

            contactsList.querySelectorAll('.contact-item').forEach(el => {
                el.addEventListener('click', () => {
                    const uid = el.dataset.uid;
                    const chatId = el.dataset.chatid;
                    if (uid && chatId) {
                        openChat(uid, chatId);
                    }
                });
            });
        }

        // ============================================================
        // ရှာဖွေမှု စစ်ထုတ်ခြင်း (Search Filter)
        // ============================================================
        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.toLowerCase().trim();
            const items = contactsList.querySelectorAll('.contact-item');
            let hasVisible = false;
            items.forEach(item => {
                const name = item.querySelector('.info .name')?.textContent?.toLowerCase() || '';
                if (name.includes(searchTerm)) {
                    item.style.display = 'flex';
                    hasVisible = true;
                } else {
                    item.style.display = 'none';
                }
            });

            const existingEmpty = contactsList.querySelector('.empty-state:not(.global)');
            if (!hasVisible && items.length > 0) {
                if (!existingEmpty) {
                    const empty = document.createElement('div');
                    empty.className = 'empty-state';
                    empty.innerHTML = `<i class="fas fa-user-slash"></i><p>"${escapeHtml(searchTerm)}" နှင့် ကိုက်ညီသူမရှိပါ</p>`;
                    contactsList.appendChild(empty);
                }
            } else if (existingEmpty) {
                existingEmpty.remove();
            }
        });

        // ============================================================
        // စကားပြောခန်း ဖွင့်ခြင်း (Open Chat)
        // ============================================================
        async function openChat(partnerUid, chatId) {
            if (!currentUser) {
                showToast('ကျေးဇူးပြု၍ အကောင့်ဝင်ပါ။', 'info');
                return;
            }
            if (partnerUid === currentUser.uid) {
                showToast("ကိုယ်နဲ့ကိုယ် စကားမပြောနိုင်ပါ။", 'info');
                return;
            }

            activeChatId = chatId;
            activeChatPartnerUid = partnerUid;

            chatPlaceholder.style.display = 'none';
            chatActive.style.display = 'flex';

            contactsList.querySelectorAll('.contact-item').forEach(el => {
                el.classList.toggle('active', el.dataset.uid === partnerUid);
            });

            const partner = allUsers[partnerUid];
            if (partner) {
                chatUserName.innerHTML = `${escapeHtml(partner.displayName)} ${renderVerifiedBadge(partner.verified)}`;
                setAvatarElement(chatUserAvatar, partner.photoURL, partner.displayName);
                // အခြေအနေ မွမ်းမံ
                updateChatHeaderStatus(partner.online, partner.lastSeen);
            } else {
                chatUserName.textContent = 'အသုံးပြုသူ';
                setAvatarElement(chatUserAvatar, '', '');
                chatUserStatus.textContent = 'အော့ဖ်လိုင်း';
                chatUserStatus.className = 'user-status';
                chatHeaderStatusDot.className = 'status-dot offline';
            }

            // ချတ်စာရွက် သေချာရှိစေရန်
            try {
                const chatRef = doc(db, 'chats', chatId);
                const chatSnap = await getDoc(chatRef);
                if (!chatSnap.exists()) {
                    await setDoc(chatRef, {
                        participants: [currentUser.uid, partnerUid],
                        lastMessage: '',
                        lastUpdated: serverTimestamp(),
                        createdAt: serverTimestamp()
                    });
                } else {
                    const data = chatSnap.data();
                    const participants = data.participants || [];
                    if (!participants.includes(currentUser.uid) || !participants.includes(partnerUid)) {
                        const newParticipants = [...new Set([...participants, currentUser.uid, partnerUid])];
                        await updateDoc(chatRef, { participants: newParticipants });
                    }
                }
            } catch (err) {
                console.warn('ချတ်စာရွက် သတ်မှတ်ရာတွင် အမှား:', err);
                if (err.code === 'permission-denied') {
                    showToast('ချတ်ဖန်တီးခွင့် မရှိပါ။ Firestore စည်းမျဉ်းကို စစ်ဆေးပါ။', 'error');
                } else {
                    showToast('ချတ်သတ်မှတ်ရာတွင် အမှား: ' + err.message, 'error');
                }
                return;
            }

            // စာများ နားထောင်ခြင်း
            if (unsubscribeMessages) {
                unsubscribeMessages();
                unsubscribeMessages = null;
            }

            const messagesRef = collection(db, 'chats', chatId, 'messages');
            const q = query(messagesRef, orderBy('createdAt', 'asc'));

            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                let html = '';
                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const isSent = data.senderId === currentUser.uid;
                    const time = data.createdAt?.toDate?.() || new Date();
                    const timeStr = formatTime(time);
                    html += `
                        <div class="message-item ${isSent ? 'sent' : 'received'}">
                            ${escapeHtml(data.text)}
                            <span class="time">${timeStr}</span>
                        </div>
                    `;
                });
                messagesList.innerHTML = html || '<div style="text-align:center;color:var(--text-muted);padding:20px;">စာမရှိသေးပါ။ ဟိုင်းလိုက်ပါ။</div>';
                messagesList.scrollTop = messagesList.scrollHeight;
                markMessagesAsRead(chatId, partnerUid);
            }, (err) => {
                console.error('စာများဖွင့်ရာတွင် အမှား:', err);
                if (err.code === 'permission-denied') {
                    showToast('စာများဖတ်ခွင့် မရှိပါ။', 'error');
                    messagesList.innerHTML = `
                        <div style="text-align:center;color:var(--text-muted);padding:20px;">
                            <i class="fas fa-lock" style="font-size:24px;display:block;margin-bottom:8px;"></i>
                            ခွင့်ပြုချက် မရှိပါ။ သင်သည် ပါဝင်သူဖြစ်ကြောင်း သေချာပါစေ။
                        </div>
                    `;
                } else {
                    showToast('စာများဖွင့်ရာတွင် အမှား: ' + err.message, 'error');
                }
            });

            messageInput.focus();
        }

        // ============================================================
        // ခေါင်းစီးရှိ အခြေအနေကို မွမ်းမံခြင်း (Update Header Status)
        // ============================================================
        function updateChatHeaderStatus(isOnline, lastSeen) {
            if (isOnline) {
                chatUserStatus.textContent = 'အွန်လိုင်း';
                chatUserStatus.className = 'user-status online';
                chatHeaderStatusDot.className = 'status-dot online';
            } else {
                let statusText = 'အော့ဖ်လိုင်း';
                if (lastSeen) {
                    const lastSeenDate = lastSeen.toDate ? lastSeen.toDate() : new Date(lastSeen);
                    const diff = Math.floor((Date.now() - lastSeenDate) / 1000);
                    if (diff < 60) statusText = 'အခုလေးတင် မြင်ခဲ့ရ';
                    else if (diff < 3600) statusText = `${Math.floor(diff / 60)} မိနစ်ခန့်က မြင်ခဲ့ရ`;
                    else if (diff < 86400) statusText = `${Math.floor(diff / 3600)} နာရီခန့်က မြင်ခဲ့ရ`;
                    else statusText = `${Math.floor(diff / 86400)} ရက်ခန့်က မြင်ခဲ့ရ`;
                }
                chatUserStatus.textContent = statusText;
                chatUserStatus.className = 'user-status';
                chatHeaderStatusDot.className = 'status-dot offline';
            }
        }

        // ============================================================
        // စာဖတ်ပြီးကြောင်း အမှတ်အသားပြုခြင်း (Mark as Read)
        // ============================================================
        async function markMessagesAsRead(chatId, partnerUid) {
            if (!currentUser) return;
            try {
                const msgsRef = collection(db, 'chats', chatId, 'messages');
                const q = query(msgsRef,
                    where('receiverId', '==', currentUser.uid),
                    where('read', '==', false)
                );
                const snap = await getDocs(q);
                if (snap.empty) return;
                const batch = writeBatch(db);
                snap.forEach(d => {
                    batch.update(d.ref, { read: true });
                });
                await batch.commit();
                // UI အပေါ်က အရေအတွက် ဖယ်ရှားရန်
                const contactItems = contactsList.querySelectorAll('.contact-item');
                contactItems.forEach(el => {
                    if (el.dataset.uid === partnerUid) {
                        const badge = el.querySelector('.unread-badge');
                        if (badge) badge.remove();
                    }
                });
            } catch (err) {
                console.warn('ဖတ်ပြီးကြောင်း မှတ်ရာတွင် အမှား:', err);
            }
        }

        // ============================================================
        // စာပို့ခြင်း (Send Message)
        // ============================================================
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) {
                showToast('ကျေးဇူးပြု၍ စာရိုက်ပါ။', 'info');
                return;
            }
            if (!activeChatId || !activeChatPartnerUid) {
                showToast('ကျေးဇူးပြု၍ စကားဝိုင်းတစ်ခုကို ရွေးပါ။', 'info');
                return;
            }
            if (isSending) return;

            isSending = true;
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            try {
                const chatRef = doc(db, 'chats', activeChatId);
                const chatSnap = await getDoc(chatRef);
                if (!chatSnap.exists()) {
                    await setDoc(chatRef, {
                        participants: [currentUser.uid, activeChatPartnerUid],
                        lastMessage: text,
                        lastUpdated: serverTimestamp(),
                        createdAt: serverTimestamp()
                    });
                } else {
                    const data = chatSnap.data();
                    const participants = data.participants || [];
                    if (!participants.includes(currentUser.uid) || !participants.includes(activeChatPartnerUid)) {
                        const newParticipants = [...new Set([...participants, currentUser.uid, activeChatPartnerUid])];
                        await updateDoc(chatRef, { participants: newParticipants });
                    }
                }

                const msgData = {
                    senderId: currentUser.uid,
                    receiverId: activeChatPartnerUid,
                    text: text,
                    read: false,
                    createdAt: serverTimestamp()
                };
                await addDoc(collection(db, 'chats', activeChatId, 'messages'), msgData);

                await updateDoc(chatRef, {
                    lastMessage: text,
                    lastUpdated: serverTimestamp()
                });

                messageInput.value = '';
                messageInput.focus();
            } catch (err) {
                console.error('စာပို့ရာတွင် အမှား:', err);
                if (err.code === 'permission-denied') {
                    showToast('ခွင့်ပြုချက် မရှိပါ။ သင်သည် ပါဝင်သူဖြစ်ကြောင်း သေချာပါစေ။', 'error');
                } else {
                    showToast('စာပို့ရာတွင် အမှား: ' + err.message, 'error');
                }
            } finally {
                isSending = false;
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> ပို့မည်';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ============================================================
        // URL Parameter မှ user ကို ဖွင့်ခြင်း
        // ============================================================
        const urlParams = new URLSearchParams(window.location.search);
        const targetUserFromUrl = urlParams.get('user');
        if (targetUserFromUrl) {
            if (isAuthReady && currentUser) {
                if (allUsers[targetUserFromUrl]) {
                    setTimeout(() => openChat(targetUserFromUrl, getChatId(currentUser.uid, targetUserFromUrl)), 500);
                } else {
                    pendingTargetUser = targetUserFromUrl;
                    showToast('အသုံးပြုသူကို ရှာနေသည်...', 'info');
                }
            } else {
                pendingTargetUser = targetUserFromUrl;
            }
        }

        console.log('💬 My Nook ချတ် (မြန်မာလို + Online/Offline) စတင်ပါပြီ။');
    </script>

    <!-- 
    ============================================================
    Firestore လုံခြုံရေး စည်းမျဉ်းများ (ဖိုင်ရယ်ထဲထည့်ရန်)
    ============================================================
    rules_version = '2';
    service cloud.firestore {
      match /databases/{database}/documents {
        // users collection - အကောင့်ဝင်ထားသူတိုင်း ဖတ်ခွင့်ရှိပြီး ကိုယ်ပိုင် doc ကိုသာ ပြင်ခွင့်ရှိသည်။
        match /users/{userId} {
          allow read: if request.auth != null;
          allow write: if request.auth != null && request.auth.uid == userId;
        }
        
        // chats collection - ပါဝင်သူများသာ ဖတ်/ရေး လုပ်ခွင့်ရှိသည်။
        match /chats/{chatId} {
          allow read: if request.auth != null && 
            request.auth.uid in resource.data.participants;
          allow write: if request.auth != null && 
            (request.auth.uid in resource.data.participants || 
             request.auth.uid in request.resource.data.participants);
            
          match /messages/{messageId} {
            allow read: if request.auth != null && 
              request.auth.uid in get(/databases/$(database)/documents/chats/$(chatId)).data.participants;
            allow write: if request.auth != null && 
              request.auth.uid in get(/databases/$(database)/documents/chats/$(chatId)).data.participants;
          }
        }
      }
    }
    -->

</body>
